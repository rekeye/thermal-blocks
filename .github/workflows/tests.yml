name: Tests
on: [push]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - uses: willcaul/jest-github-action@v4
        with:
          test-command: "bun test"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}